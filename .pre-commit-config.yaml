minimum_pre_commit_version: '2.20.0'
default_language_version:
  python: python3.12

# Globale Ausschlüsse (virtuelle Umgebungen, build-Artefakte, Git-Ordner)
exclude: |
  (?x)(
    ^\.venv/|
    ^\.mypy_cache/|
    ^\.pytest_cache/|
    ^\.tox/|
    ^build/|
    ^dist/|
    ^\.git/|
    ^node_modules/|
    ^copilot/|
    ^\.idea/|
    ^\.vscode/|
    ^\.github/|
    ^src/app/resources/.*_rc\.py$
  )

repos:
-   repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-ast
      - id: check-builtin-literals
      - id: check-merge-conflict
      - id: check-illegal-windows-names
      - id: check-json
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
      - id: detect-private-key
      - id: mixed-line-ending
        args: [ --fix=lf ]

-   repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.15.4
    hooks:
    # Run the linter.
    - id: ruff-check
      types_or: [ python, pyi ]
      args: [ --fix ]
    # Run the formatter.
    - id: ruff-format
      types_or: [ python, pyi ]

-   repo: https://github.com/PyCQA/isort
    rev: 8.0.1
    hooks:
    -   id: isort
        name: isort (Python)

-   repo: https://github.com/pre-commit/mirrors-mypy
    rev: v1.19.1
    hooks:
    -   id: mypy
        language: system
        pass_filenames: false
        args: ['src', '--strict', '--exclude', 'src/app/resources/.*_rc\\.py$']

- repo: local
  hooks:
    - id: markdownlint
      name: markdownlint (via node)
      entry: markdownlint
      language: node
      additional_dependencies: ["markdownlint-cli"]
      files: \.(md|markdown)$
      types: [file]
